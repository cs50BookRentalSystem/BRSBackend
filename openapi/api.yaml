openapi: 3.0.3
info:
  title: Book Rental System API
  description: | 
    A comprehensive API for managing a library's book rental system, including: 
    - Librarian authentication 
    - Book inventory management 
    - Student registration and management 
    - Book rental and return transactions
    - Overdue tracking and reporting
  version: 1.0.0

servers:
  - url: 'http://localhost:8080'
    description: "Local setup"

security:
  - cookieAuth: []

paths:
  /login:
    post:
      summary: "librarian login"
      description: "Authenticate librarian credentials and create a session"
      operationId: "Login"
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              user: "admin"
              pass: "securePasswd"
      responses:
        '200':
          description: "Login successful - session created"
          headers:
            Set-Cookie:
              description: "Session cookie to maintain login state"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  librarian_id:
                    type: string
                    format: uuid
              example:
                message: "Login successful"
                librarian_id: "12345678-e29b-41d4-a716-446655440000"
        '401':
          description: "Invalid username or password"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 401
                message: "Invalid credentials"
        '500':
          $ref: '#/components/responses/InternalServerError'
  /logout:
    post:
      summary: "Logout librarian"
      description: "Invalidate the current session and logout the librarian"
      operationId: "Logout"
      tags:
        - Authentication
      responses:
        '200':
          description: "Logout successful"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logout successful"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /books:
    get:
      summary: "List or search books"
      description: "Retrieve all books or filter by partial title or ID"
      operationId: "ListOrSearchBooks"
      tags:
        - Books
      parameters:
        - name: query
          in: query
          required: false
          description: "Optional search term (partial title match or exact ID match)"
          schema:
            type: string
            minLength: 1
            maxLength: 100
          example: "Theory of Everything"
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: "Successfully retrieved list of books"
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Books"
        '400':
          $ref: '#/components/responses/InvalidRequestParameters'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: "Add a new book"
      description: "Register a new book in the library inventory"
      operationId: "AddBook"
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Books'
      responses:
        '201':
          description: "Book added successfully"
          headers:
            Location:
              description: "URL of the newly created book resource"
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Book added successfully"
        '400':
          $ref: '#/components/responses/InvalidRequestBody'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /students:
    get:
      summary: "List all students"
      description: "Retrieve a paginated list of all registered students"
      operationId: "ListAllStudents"
      tags:
        - Students
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: "Successfully retrieved list of students"
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Students'
        '400':
          $ref: '#/components/responses/InvalidRequestParameters'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: "Register a new student"
      description: "Add a new student to the system"
      operationId: "AddStudent"
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Students'
      responses:
        '201':
          description: "Student added successfully"
          headers:
            Location:
              description: "URL of the newly created book resource"
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student added successfully"
        '400':
          $ref: '#/components/responses/InvalidRequestBody'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /students/{id}:
    get:
      summary: "Get a Student by ID"
      operationId: "GetStudentById"
      tags:
        - Students
      parameters:
        - name: id
          in: path
          required: true
          description: "The ID of the Student to retrieve"
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: "Student found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Students'
        '404':
          description: "Student not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student not found"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rents:
    post:
      summary: "Rent books for a student"
      operationId: "CreateRentTransaction"
      tags:
        - Rents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentRequest'
      responses:
        '201':
          description: "Rent created"
          content:
            application/json:
              schema:
                type: object
                properties:
                  cart_id:
                    type: string
                    format: uuid
                  message:
                    type: string
                    example: "Books rented successfully"
        '400':
          $ref: '#/components/responses/InvalidRequestBody'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: "Get list of all rents with optional filters"
      operationId: "ListRents"
      tags:
        - Rents
      parameters:
        - name: book_name
          in: query
          description: "Filter by book title (partial match)"
          required: false
          schema:
            type: string
        - name: student_name
          in: query
          description: "Filter by student first or last name (partial match)"
          required: false
          schema:
            type: string
        - name: date
          in: query
          description: "Filter by rent date (YYYY-MM-DD)"
          required: false
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        '200':
          description: "List of rent records"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RentSummary'
        '400':
          $ref: '#/components/responses/InvalidRequestParameters'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /returns:
    get:
      summary: "List books currently rented by a student"
      operationId: "GetRentedBooksByStudent"
      tags:
        - Rents
        - Returns
      parameters:
        - name: student_id
          in: query
          description: "Student UUID"
          required: false
          schema:
            type: string
            format: uuid
        - name: student_name
          in: query
          description: "Partial name of the student (first or last)"
          required: false
          schema:
            type: string
      responses:
        '200':
          description: "List of currently rented books by student"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RentSummary'
        '400':
          $ref: '#/components/responses/InvalidRequestParameters'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      summary: "Mark a cart as returned"
      operationId: "ReturnBooks"
      tags:
        - Rents
        - Returns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cart_id:
                  type: string
                  format: uuid
              required:
                - cart_id
      responses:
        '200':
          description: "Cart marked as returned"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  cart_id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/InvalidRequestBody'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /overdues:
    get:
      summary: "Get list of overdue users"
      operationId: "ListOverdueUsers"
      tags:
        - Reports
      parameters:
        - name: student_name
          in: query
          required: false
          schema:
            type: string
        - name: student_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: "List of overdue users"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OverdueUser"
        '400':
          $ref: '#/components/responses/InvalidRequestParameters'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /reports:
    get:
      summary: "Get rent statistics report"
      operationId: "GetRentReport"
      tags:
        - Reports
      parameters:
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: "Rent report retrieved successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentReport"
        '400':
          $ref: '#/components/responses/InvalidRequestParameters'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    LoginRequest:
      x-go-type: models.Librarian
      x-go-type-import:
        name: Librarian
        path: BRSBackend/pkg/models
      type: object
      properties:
        user:
          type: string
        pass:
          type: string
      required:
        - user
        - pass

    RentRequest:
      type: object
      properties:
        student_id:
          type: string
          format: uuid
        book_ids:
          type: array
          items:
            type: string
            format: uuid
      required:
        - student_id
        - book_ids

    RentSummary:
      type: object
      properties:
        rent_id:
          type: string
          format: uuid
        cart_id:
          type: string
          format: uuid
        book_title:
          type: string
        student_name:
          type: string
        rented_date:
          type: string
          format: date-time

    OverdueUser:
      type: object
      properties:
        student_name:
          type: string
        phone:
          type: string
        total_books:
          type: integer
        date_rented:
          type: string
          format: date-time
        days_overdue:
          type: integer

    BookRentStats:
      type: object
      properties:
        book_title:
          type: string
        rented_count:
          type: integer

    RentReport:
      type: object
      properties:
        total_rents:
          type: integer
        total_students:
          type: integer
        top_books:
          type: array
          items:
            $ref: "#/components/schemas/BookRentStats"

    Books:
      x-go-type: models.Books
      x-go-type-import:
        name: Books
        path: BRSBackend/pkg/models
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: false
        description:
          type: string
        count:
          type: integer
          nullable: false

    Students:
      x-go-type: models.Students
      x-go-type-import:
        name: Students
        path: BRSBackend/pkg/models
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
          nullable: false
        lastName:
          type: string
          nullable: false
        major:
          type: string
          nullable: false
        phone:
          type: string
          nullable: false

    Rents:
      x-go-type: models.Rents
      x-go-type-import:
        name: Rents
        path: BRSBackend/pkg/models
      type: object
      properties:
        id:
          type: string
          format: uuid
        cart_id:
          type: string
          format: uuid
        book_id:
          type: string
          format: uuid

    Carts:
      x-go-type: models.Carts
      x-go-type-import:
        name: Rents
        path: BRSBackend/pkg/models
      type: object
      properties:
        id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - RENTED
            - RETURNED

    Error:
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: Error code
        message:
          type: string
          description: Error message

  parameters:
    offsetParam:
      name: offset
      in: query
      description: Number of items to skip before returning the results.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0

    limitParam:
      name: limit
      in: query
      description: Maximum number of items to return.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20

  responses:
    UnauthorizedError:
      description: "Authentication required or session expired"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 401
            message: "Authentication required"
    
    InternalServerError:
      description: "Internal server error"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 500
            message: "An unexpected error occurred"

    InvalidRequestParameters:
      description: "Invalid request parameters"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 400
            message: "Invalid request parameters"

    InvalidRequestBody:
      description: "Invalid request Body"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 400
            message: "Invalid request Body"